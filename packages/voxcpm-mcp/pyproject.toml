[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voxcpm-mcp"
version = "0.1.0"
description = "MCP server for VoxCPM — local, high-quality text-to-speech (30 languages, voice design, voice cloning). Wraps the OpenBMB/VoxCPM TTS pipeline."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Bill Agner", email = "noreply@hermes.local" },
]
keywords = ["mcp", "voxcpm", "tts", "text-to-speech", "voice-cloning", "voice-design", "openbmb"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]
# voxcpm is installed separately in this venv (editable from ../../).
# Listed as a runtime dep so the package metadata is self-describing, but
# `uv pip install -e .` will reuse the already-installed editable copy.
dependencies = [
    "voxcpm>=2.0",
    "mcp[cli]>=1.0",
    "soundfile>=0.13",
]

[project.scripts]
voxcpm-mcp = "voxcpm_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/voxcpm_mcp"]